openapi: 3.0.3
info:
  title: Nullable API
  version: "1.0"

components:
  schemas:
    Dinosaur:
      type: object
      required:
        - name
        - tag
      properties:
        name:
          type: string
          description: The name of the dinosaur
        tag:
          type: string
          nullable: true
          description: An optional tag that may be explicitly null

paths:
  /dinosaurs:
    get:
      summary: Get a list of dinosaurs
      responses:
        '200':
          description: A list of dinosaurs
