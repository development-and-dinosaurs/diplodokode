openapi: 3.0.3
info:
  title: Ref API
  version: "1.0"

components:
  schemas:
    Dinosaur:
      type: object
      description: A magnificent dinosaur
      required:
        - name
        - diet
      properties:
        name:
          type: string
          description: The name of the dinosaur
        diet:
          $ref: '#/components/schemas/Diet'
        favouritePrey:
          type: string
          description: The name of the dinosaur's favourite prey
    Diet:
      type: string
      description: The diet of a dinosaur
      enum:
        - carnivore
        - herbivore

paths:
  /dinosaurs:
    get:
      summary: Get a list of dinosaurs
      responses:
        '200':
          description: A list of dinosaurs
