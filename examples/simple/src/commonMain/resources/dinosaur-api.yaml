openapi: 3.0.3
info:
  title: Dinosaur API
  version: 1.0.0
  description: API for managing dinosaur information

components:
  schemas:
    Dinosaur:
      type: object
      properties:
        name:
          type: string
          description: The name of the dinosaur
        species:
          type: string
          description: The species of the dinosaur
        age:
          type: integer
          description: The age of the dinosaur in years
        weight:
          type: number
          description: The weight of the dinosaur in kilograms
          default: 0.0
        isCarnivore:
          type: boolean
          description: Whether the dinosaur is carnivore
          default: false
        traits:
          type: object
          description: Named traits for this dinosaur (e.g. "diet" to "carnivore")
          additionalProperties:
            type: string
        metadata:
          type: object
          description: Open-ended metadata — any additional data associated with this dinosaur
          additionalProperties: true
      required:
        - name
        - species
        - age

paths:
  /dinosaurs:
    get:
      summary: Get a list of dinosaurs
      responses:
        '200':
          description: A list of dinosaurs
